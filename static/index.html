<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RAW Converter Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="workspace">
            <div class="sidebar">
                <h2>AI RAW Converter</h2>
                
                <div class="control-group">
                    <label class="upload-btn" for="file-upload">Выбрать RAW файл</label>
                    <input type="file" id="file-upload" accept=".cr2,.cr3,.dng">
                    <span id="file-name">Файл не выбран</span>
                </div>

                <hr class="divider">

                <div class="control-group">
                    <label>Сила нейросети <span id="strength-val">100%</span></label>
                    <input type="range" id="strength" min="0" max="100" value="100">
                </div>
                <div class="control-group">
                    <label>Экспозиция <span id="expo-val">0.0</span></label>
                    <input type="range" id="exposure" min="-2.0" max="2.0" step="0.1" value="0.0">
                </div>
                <div class="control-group">
                    <label>Температура <span id="temp-val">0</span></label>
                    <input type="range" id="temp" min="-100" max="100" value="0">
                </div>

                <div class="spacer"></div>
                <button class="process-btn" id="process-btn">ОБРАБОТАТЬ</button>
            </div>

            <div class="main-view">
                <div class="placeholder" id="placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <p>Загрузите изображение для начала работы</p>
                </div>
                <div class="loader" id="loader"></div>
                <div class="image-container" id="result-container">
                    <img id="result-img" src="" alt="Результат">
                </div>
            </div>
        </div>

        <div class="history-filmstrip">
            <h3>История обработок</h3>
            <div class="filmstrip-items" id="filmstrip-items">
                </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
