version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: raw_converter_db
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: history_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  web:
    build: .
    container_name: raw_converter_web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres_user:postgres_password@db:5432/history_db
    volumes:
      - ./static/history:/app/static/history
    depends_on:
      - db
    restart: always

volumes:
  pgdata: